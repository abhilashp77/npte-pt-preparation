databases:
  - name: npte-db
    databaseName: npte_portal
    user: npte
    plan: free
    region: oregon

services:
  # Backend
  - type: web
    name: npte-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: npte-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: npte-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: npte-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: npte-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: npte-db
          property: password
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_SD3_API_KEY
        sync: false

  # Frontend
  - type: web
    name: npte-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

    envVars:
      - key: VITE_API_BASE_URL
        value: https://npte-backend.onrender.com


