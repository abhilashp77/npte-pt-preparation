spring:
  application:
    name: portal

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:npte_portal}
    username: ${SPRING_DATASOURCE_USERNAME:npte}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

spring.ai.openai.api-key: ${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model: gpt-3.5-turbo
spring.ai.openai.chat.options.temperature: 0.7

gemini:
  api:
    key: ${GEMINI_API_KEY:}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}


