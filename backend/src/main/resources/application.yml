spring:
  application:
    name: portal

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:npte_portal}${DB_URL_PARAMS:?sslmode=prefer}
    username: ${SPRING_DATASOURCE_USERNAME:npte}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

spring.ai.openai.api-key: ${OPENAI_API_KEY:local-dummy-key}
spring.ai.openai.chat.options.model: gpt-3.5-turbo
spring.ai.openai.chat.options.temperature: 0.7

gemini:
  api:
    key: ${GEMINI_API_KEY:local-dummy-key}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:local-dummy-key}

nvidia:
  api:
    key: ${NVIDIA_API_KEY:local-dummy-key}
    url: https://integrate.api.nvidia.com/v1
    model: meta/llama-3.1-8b-instruct
  image:
    key: ${NVIDIA_IMAGE_API_KEY:local-dummy-key}
    url: ${NVIDIA_IMAGE_API_URL:https://ai.api.nvidia.com/v1/genai/black-forest-labs/flux.2-klein-4b}
