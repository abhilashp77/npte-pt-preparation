version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: npte-postgres
    environment:
      POSTGRES_USER: npte
      POSTGRES_PASSWORD: password
      POSTGRES_DB: npte_portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
